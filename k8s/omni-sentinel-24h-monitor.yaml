apiVersion: batch/v1
kind: CronJob
metadata:
  name: omni-sentinel-24h-monitor
  namespace: sentinel-governance
spec:
  schedule: "@daily"
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            sentinel.auth/containment-level: "HIGH"
            sentinel.auth/spiffe-id: "spiffe://apex-gsifi/monitor-agent"
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 2000
          containers:
          - name: monitor
            # Using versioned tag to satisfy security scanners
            image: sentinel-monitor:v5.1.0
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
            volumeMounts:
            - name: tpm-device
              mountPath: /dev/tpm0
              readOnly: true
            env:
            - name: AWS_S3_BUCKET
              value: "gsifi-worm-audit"
          restartPolicy: OnFailure
          volumes:
          - name: tpm-device
            # Secure volume mount via CSI driver for institutional TEE access
            csi:
              driver: tpm.csi.sentinel.io
