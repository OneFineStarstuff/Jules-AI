apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-sentinel-24h-monitor
  labels:
    app: omni-sentinel
    governance: sentinel-v2.4
spec:
  replicas: 3
  selector:
    matchLabels:
      app: omni-sentinel
  template:
    metadata:
      labels:
        app: omni-sentinel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
      - name: monitor
        image: sentinel/omni-sentinel-monitor:v5.1.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
